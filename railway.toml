[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && cd erp_chvs && python manage.py collectstatic --noinput"

[deploy]
# Gunicorn: gevent con 4 workers × 6 worker-connections = 24 conexiones DB máximo.
# Railway Postgres hobby tiene ~25 max_connections. Con gevent cada greenlet abre su propia conexión
# Django (thread-local), por eso worker-connections debe mantenerse bajo.
startCommand = "cd erp_chvs && mkdir -p staticfiles && gunicorn erp_chvs.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --worker-class gevent --worker-connections 6 --max-requests 1000 --max-requests-jitter 100 --timeout 120 --keep-alive 5 --log-level info --access-logfile - --error-logfile -"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[healthcheck]
path = "/"
timeout = 100
interval = 60
