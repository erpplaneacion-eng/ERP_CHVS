[build]
builder = "nixpacks"
buildCommand = "pip install gevent>=24.10.1 && pip install -r requirements.txt"

[deploy]
# Gunicorn: gevent con 4 workers + 50 worker-connections por worker.
# `migrate` y `collectstatic` se ejecutan fuera del arranque para acelerar reinicios y reducir riesgo operacional.
startCommand = "cd erp_chvs && gunicorn erp_chvs.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --worker-class gevent --worker-connections 50 --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --worker-tmp-dir /dev/shm"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[healthcheck]
path = "/"
timeout = 100
interval = 60
