{% extends 'base.html' %}
{% load static %}

{% block title %}Seguimiento por Líder{% endblock %}

{% block content %}
<div class="contabilidad-container">
    <div class="page-header">
        <div class="header-left">
            <h2><i class="fas fa-users"></i> Seguimiento por Líder</h2>
            <p>Estado de todos los registros agrupados por líder responsable</p>
        </div>
        <div class="header-right">
            <input type="text" id="filtroLider" class="form-control" placeholder="Buscar líder..." style="max-width:240px">
        </div>
    </div>

    <div id="loadingMsg" class="text-center py-5">
        <i class="fas fa-spinner fa-spin fa-2x"></i><p class="mt-2">Cargando...</p>
    </div>

    <div id="contenedor" style="display:none"></div>
</div>

<style>
.lider-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    margin-bottom: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
}
.lider-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    background: #f8f9fa;
    border-bottom: 1px solid #e0e0e0;
    cursor: pointer;
    user-select: none;
}
.lider-header:hover { background: #eef2f7; }
.lider-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #1e3a8a; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; flex-shrink: 0;
}
.lider-nombre { font-weight: 600; font-size: 15px; color: #1e3a8a; }
.lider-meta { font-size: 12px; color: #666; margin-top: 2px; }
.lider-badges { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.badge-contador {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.badge-activo { background: #e3f2fd; color: #1565c0; }
.badge-cerrado { background: #e8f5e9; color: #2e7d32; }
.badge-critico-DEVUELTO_COMPRAS { background: #ffeaea; color: #c0392b; }
.badge-critico-OBSERVADO_CONTABILIDAD { background: #fff3e0; color: #e65100; }
.badge-critico-ENVIADO, .badge-critico-EN_REVISION_COMPRAS { background: #e8f4fd; color: #1565c0; }
.badge-critico-APROBADO_COMPRAS, .badge-critico-APROBADO_CONTABILIDAD { background: #e8f5e9; color: #2e7d32; }
.badge-critico-BORRADOR { background: #f5f5f5; color: #777; }
.lider-body { padding: 16px 20px; display: none; }
.lider-body.abierto { display: block; }
.toggle-icon { transition: transform 0.2s; font-size: 12px; color: #888; }
.toggle-icon.abierto { transform: rotate(180deg); }

.tabla-registros { width: 100%; border-collapse: collapse; font-size: 13px; }
.tabla-registros th {
    background: #1e3a8a; color: #fff; padding: 8px 10px;
    text-align: left; font-weight: 600;
}
.tabla-registros td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
.tabla-registros tr:last-child td { border-bottom: none; }
.tabla-registros tr:hover td { background: #f8f9ff; }

.estado-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
}
.estado-BORRADOR { background: #f5f5f5; color: #777; }
.estado-ENVIADO { background: #e3f2fd; color: #1565c0; }
.estado-EN_REVISION_COMPRAS { background: #e8f4fd; color: #0277bd; }
.estado-DEVUELTO_COMPRAS { background: #ffeaea; color: #c0392b; }
.estado-APROBADO_COMPRAS { background: #e8f5e9; color: #2e7d32; }
.estado-OBSERVADO_CONTABILIDAD { background: #fff3e0; color: #e65100; }
.estado-APROBADO_CONTABILIDAD { background: #e8f5e9; color: #1b5e20; }
.estado-CERRADO { background: #ede7f6; color: #4527a0; }

.dias-badge { font-size: 11px; color: #555; }
.dias-alerta { color: #c0392b; font-weight: 700; }
.derivado-tag {
    font-size: 10px; background: #e3f2fd; color: #1565c0;
    border-radius: 4px; padding: 1px 6px; margin-left: 4px;
}
.sin-registros { text-align: center; color: #999; padding: 20px; }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    let allData = [];

    fetch('/contabilidad/api/seguimiento-lideres/')
        .then(r => r.json())
        .then(json => {
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('contenedor').style.display = 'block';
            if (!json.success) { mostrarError(json.error); return; }
            allData = json.data;
            renderizar(allData);
        })
        .catch(() => mostrarError('Error de conexión'));

    document.getElementById('filtroLider').addEventListener('input', function () {
        const q = this.value.trim().toLowerCase();
        renderizar(q ? allData.filter(l => l.lider_nombre.toLowerCase().includes(q)) : allData);
    });

    function renderizar(data) {
        const cont = document.getElementById('contenedor');
        if (!data.length) {
            cont.innerHTML = '<div class="sin-registros"><i class="fas fa-users-slash fa-2x mb-2"></i><br>No hay líderes con registros.</div>';
            return;
        }

        cont.innerHTML = data.map(lider => {
            const inicial = (lider.lider_nombre[0] || '?').toUpperCase();
            const estadoCritico = lider.estado_critico || '';
            const labelCritico = estadoCritico
                ? `<span class="badge-contador badge-critico-${estadoCritico}">${estadoLabel(estadoCritico)}</span>`
                : '';

            const filas = lider.registros.map(r => {
                const derivadoTag = r.es_derivado
                    ? `<span class="derivado-tag" title="Derivado del RC-${r.registro_origen_id}">derivado</span>` : '';
                const diasClass = r.dias_en_estado > 5 && r.estado !== 'CERRADO' ? 'dias-alerta' : 'dias-badge';
                const devTag = r.num_devoluciones > 0
                    ? `<span style="color:#c0392b;font-size:11px" title="${r.num_devoluciones} devolución(es)">
                         <i class="fas fa-undo"></i> ${r.num_devoluciones}
                       </span>` : '—';
                return `
                <tr>
                    <td>
                        <a href="/contabilidad/registro/${r.id}/" style="font-weight:600;color:#1e3a8a">
                            RC-${r.id}
                        </a>${derivadoTag}
                    </td>
                    <td>${r.tipo_display}</td>
                    <td>${meses[r.periodo_mes - 1]} ${r.periodo_ano}</td>
                    <td><span class="estado-badge estado-${r.estado}">${r.estado_display}</span></td>
                    <td><span class="${diasClass}">${r.dias_en_estado}d</span></td>
                    <td>${devTag}</td>
                    <td>${r.total_documentos} doc.</td>
                    <td>$${Number(r.valor_total).toLocaleString('es-CO', {minimumFractionDigits:0})}</td>
                </tr>`;
            }).join('');

            return `
            <div class="lider-card" data-lider="${lider.lider_nombre.toLowerCase()}">
                <div class="lider-header" onclick="toggleCard(this)">
                    <div class="lider-avatar">${inicial}</div>
                    <div>
                        <div class="lider-nombre">${lider.lider_nombre}</div>
                        <div class="lider-meta">@${lider.lider_username}</div>
                    </div>
                    <div class="lider-badges">
                        ${labelCritico}
                        <span class="badge-contador badge-activo"><i class="fas fa-clock"></i> ${lider.total_activos} activo(s)</span>
                        <span class="badge-contador badge-cerrado"><i class="fas fa-check"></i> ${lider.total_cerrados} cerrado(s)</span>
                    </div>
                    <i class="fas fa-chevron-down toggle-icon ms-2"></i>
                </div>
                <div class="lider-body">
                    <table class="tabla-registros">
                        <thead>
                            <tr>
                                <th>RC</th><th>Tipo</th><th>Período</th>
                                <th>Estado</th><th>Días en estado</th>
                                <th>Devoluciones</th><th>Docs</th><th>Valor</th>
                            </tr>
                        </thead>
                        <tbody>${filas || '<tr><td colspan="8" class="sin-registros">Sin registros</td></tr>'}</tbody>
                    </table>
                </div>
            </div>`;
        }).join('');
    }

    function toggleCard(header) {
        const body = header.nextElementSibling;
        const icon = header.querySelector('.toggle-icon');
        body.classList.toggle('abierto');
        icon.classList.toggle('abierto');
    }
    window.toggleCard = toggleCard;

    function mostrarError(msg) {
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('contenedor').innerHTML =
            `<div class="sin-registros text-danger"><i class="fas fa-exclamation-circle"></i> ${msg}</div>`;
        document.getElementById('contenedor').style.display = 'block';
    }

    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const _labels = {
        'BORRADOR':'Borrador','ENVIADO':'Enviado','EN_REVISION_COMPRAS':'En revisión',
        'DEVUELTO_COMPRAS':'Devuelto','APROBADO_COMPRAS':'Aprobado compras',
        'OBSERVADO_CONTABILIDAD':'Observado','APROBADO_CONTABILIDAD':'Aprobado contab.',
        'CERRADO':'Cerrado'
    };
    function estadoLabel(e) { return _labels[e] || e; }
});
</script>
{% endblock %}
