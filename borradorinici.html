<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHVS ERP - Terreno Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f8fafc; /* Blanco azulado muy suave */
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        /* Contenedor del lienzo 3D */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            /* Hemos quitado el blur y el scale del estilo anterior para que la malla sea nítida */
        }

        /* Capa de la interfaz para que no interfiera con los clics 3D si los hubiera */
        .login-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        /* Tarjeta Glassmorphism interactiva */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 25px 50px -12px rgba(20, 184, 166, 0.15);
            pointer-events: auto; /* Permite interactuar con el formulario */
        }

        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-left {
            animation: slideLeft 0.8s ease-out forwards;
        }
    </style>
</head>
<body>

    <!-- Contenedor del Terreno 3D -->
    <div id="canvas-container"></div>

    <!-- UI - Tarjeta de Login -->
    <div class="login-container container mx-auto px-6 lg:px-20 flex justify-end w-full">
        
        <div class="w-full lg:w-1/3 max-w-md animate-slide-left" style="opacity: 0;">
            
            <div class="glass-card p-8 rounded-3xl relative overflow-hidden">
                <!-- Brillo decorativo superior -->
                <div class="absolute top-0 right-0 -mr-8 -mt-8 w-40 h-40 rounded-full bg-teal-100 opacity-60 blur-3xl"></div>

                <div class="flex items-center gap-3 mb-6 relative z-10">
                    <div class="w-12 h-12 bg-gradient-to-br from-teal-500 to-emerald-600 rounded-xl flex items-center justify-center shadow-lg text-white font-bold text-2xl">
                        C
                    </div>
                    <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">CHVS<span class="text-teal-600">.</span></h2>
                </div>
                
                <p class="text-sm text-gray-500 mb-8 font-medium relative z-10">Portal unificado de gestión de recursos.</p>

                <form onsubmit="event.preventDefault();" class="relative z-10">
                    <div class="mb-5">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Usuario / Correo</label>
                        <input type="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition bg-white/80" placeholder="usuario@chvs.com" required>
                    </div>
                    
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-semibold text-gray-700">Contraseña</label>
                            <a href="#" class="text-xs text-teal-600 hover:text-teal-800 font-bold transition">¿Recuperar clave?</a>
                        </div>
                        <input type="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition bg-white/80" placeholder="••••••••" required>
                    </div>

                    <div class="flex items-center mb-8">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-teal-500 rounded border-gray-300 focus:ring-teal-400">
                        <label for="remember" class="ml-2 text-sm font-medium text-gray-600">Mantener sesión iniciada</label>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-600 hover:to-emerald-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-teal-500/30 transition transform hover:-translate-y-0.5">
                        Ingresar al Sistema
                    </button>
                </form>
            </div>
            
            <p class="text-center text-xs text-gray-400 mt-6 font-medium">
                © 2026 CHVS Sistemas. Todos los derechos reservados.
            </p>
        </div>
    </div>

    <script>
        // --- Variables de Three.js para el Terreno ---
        let scene, camera, renderer, terrain;
        const clock = new THREE.Clock();
        
        let mouseX = 0;
        let mouseY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        function init() {
            // 1. Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc); // Fondo slate-50 de Tailwind
            
            // LA MAGIA DEL CYBER GRID: La niebla (Fog) hace que la cuadrícula desaparezca
            // a lo lejos fundiéndose con el color de fondo.
            scene.fog = new THREE.Fog(0xf8fafc, 10, 60);

            // 2. Cámara (Posicionada como si estuviéramos de pie mirando al horizonte)
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 100);
            camera.position.set(0, 10, 30);

            // 3. Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. Crear el Terreno
            // Un plano grande con mucha subdivisión para poder deformarlo
            const geometry = new THREE.PlaneGeometry(160, 160, 60, 60);
            
            // Rotamos el plano para que "acueste" en el suelo
            geometry.rotateX(-Math.PI / 2);

            const material = new THREE.MeshBasicMaterial({
                color: 0x14b8a6, // Teal 500
                wireframe: true, // Esto crea el efecto "malla de alambre" (grid)
                transparent: true,
                opacity: 0.15 // Muy sutil para que no abrume
            });

            terrain = new THREE.Mesh(geometry, material);
            
            // Bajamos un poco el terreno para que quede debajo de la interfaz
            terrain.position.y = -5;
            scene.add(terrain);

            // 5. Eventos
            document.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('resize', onWindowResize, false);

            animate();
        }

        function onMouseMove(event) {
            mouseX = (event.clientX - windowHalfX) * 0.01;
            mouseY = (event.clientY - windowHalfY) * 0.01;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // Movimiento suave de la cámara (Parallax) mirando un poco hacia abajo
            camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
            camera.position.y += ((10 - mouseY * 5) - camera.position.y) * 0.05;
            camera.lookAt(0, -2, 0);

            // --- ANIMACIÓN DEL TERRENO ---
            // Tomamos todos los vértices de la cuadrícula
            const positions = terrain.geometry.attributes.position;
            
            for (let i = 0; i < positions.count; i++) {
                // Obtenemos la posición X y Z (profundidad) original del vértice
                const x = positions.getX(i);
                const z = positions.getZ(i);
                
                // Calculamos ondas basadas en la posición X, Z y el TIEMPO
                // Al sumar 'time * 15' a la Z, simulamos que el terreno avanza hacia nosotros
                const waveX = x * 0.05;
                const waveZ = (z + time * 12) * 0.05; 
                
                // Combinamos dos ondas seno y coseno para crear colinas irregulares
                const height = Math.sin(waveX) * Math.cos(waveZ) * 3 + 
                               Math.sin(waveX * 0.5 + waveZ * 0.5) * 2.5;
                
                // Asignamos la nueva altura (eje Y) al vértice
                positions.setY(i, height);
            }
            
            // Le decimos a Three.js que actualice la forma
            positions.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
